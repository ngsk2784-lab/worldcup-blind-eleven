<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블라인드 일레븐 — S1 카드 탐색 (목업)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;600;700&family=Roboto+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-base:#0A0E14;--bg-pitch:#0D141C;--bg-vignette:#06090D;
  --surface-1:#141B24;--surface-2:#1C2631;--surface-3:#26333F;--surface-line:#33424F;
  --text-hi:#EAF1F7;--text-mid:#A5B4C0;--text-lo:#66757F;--text-onAccent:#0A0E14;
  --accent:#E8B04B;--accent-hi:#F6C766;--accent-dim:#8A6A2C;--accent-glow:rgba(232,176,75,0.45);
  --data:#4FC3D9;--data-dim:#2A6B78;
  --pos-gk:#E8B04B;--pos-def:#5B8DEF;--pos-mid:#3FB98C;--pos-fwd:#E5533C;
  --sh-1:0 2px 8px rgba(0,0,0,0.4);--sh-2:0 8px 24px rgba(0,0,0,0.5);--sh-3:0 16px 48px rgba(0,0,0,0.6);
  --glow-soft:0 0 32px rgba(232,176,75,0.25);--glow-data:0 0 20px rgba(79,195,217,0.20);
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
  --font-display:'Oswald','Black Han Sans','Noto Sans KR',sans-serif;
  --font-body:'Noto Sans KR','Oswald',sans-serif;
  --font-mono:'Roboto Mono','Noto Sans KR',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-body);color:var(--text-mid);min-height:100vh;
  background:radial-gradient(ellipse 120% 90% at 50% 30%,var(--bg-pitch) 0%,var(--bg-base) 55%,var(--bg-vignette) 100%);
  background-attachment:fixed;
}
.overline{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-lo)}
/* topbar */
.topbar{height:64px;display:flex;align-items:center;gap:24px;padding:0 32px;
  background:rgba(20,27,36,.72);backdrop-filter:blur(10px);border-bottom:1px solid var(--surface-line);
  position:sticky;top:0;z-index:10}
.brand{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:.06em;color:var(--text-hi)}
.brand b{color:var(--accent)}
.crumb{color:var(--text-lo);font-size:14px}
.filters{display:flex;gap:8px;margin-left:8px}
.chip{padding:6px 14px;border-radius:999px;border:1px solid var(--surface-line);background:transparent;
  color:var(--text-mid);font-size:13px;font-weight:500;cursor:pointer;transition:.18s;font-family:var(--font-body)}
.chip[data-p=DEF].on{border-color:var(--pos-def);background:rgba(91,141,239,.14);color:#c9dcff}
.chip[data-p=MID].on{border-color:var(--pos-mid);background:rgba(63,185,140,.14);color:#bff0dd}
.chip[data-p=FWD].on{border-color:var(--pos-fwd);background:rgba(229,83,60,.14);color:#ffd0c7}
.chip[data-p=GK].on{border-color:var(--pos-gk);background:rgba(232,176,75,.14);color:#ffe6 b3}
.progress{margin-left:auto;font-family:var(--font-mono);font-size:14px;color:var(--text-mid)}
.progress b{color:var(--accent)}
/* layout */
.wrap{display:flex;gap:24px;max-width:1200px;margin:0 auto;padding:28px 24px 100px}
.grid-col{flex:1}
.section-h{font-family:var(--font-display);font-weight:600;font-size:24px;color:var(--text-hi);margin-bottom:4px}
.section-sub{font-size:14px;color:var(--text-lo);margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
/* ===== PLAYER CARD (anon front) ===== */
.card{width:100%;aspect-ratio:220/300;background:var(--surface-2);border-radius:var(--r-lg);
  box-shadow:var(--sh-2);border-left:4px solid var(--pos-def);position:relative;overflow:hidden;
  padding:14px;cursor:grab;transition:transform .18s cubic-bezier(.16,1,.3,1),box-shadow .18s,background .18s;
  display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);background:var(--surface-3);box-shadow:var(--sh-3)}
.card.fwd{border-left-color:var(--pos-fwd)} .card.mid{border-left-color:var(--pos-mid)}
.card.gk{border-left-color:var(--pos-gk)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.ribbon{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.card.def .ribbon{color:var(--pos-def)}.card.fwd .ribbon{color:var(--pos-fwd)}
.card.mid .ribbon{color:var(--pos-mid)}.card.gk .ribbon{color:var(--pos-gk)}
.conf{display:flex;gap:3px;align-items:center}
.conf i{width:6px;height:6px;border-radius:50%;background:var(--surface-line)}
.conf i.f{background:var(--data)}
.avatar-wrap{display:flex;flex-direction:column;align-items:center;margin:2px 0 6px}
.avatar-wrap svg{filter:drop-shadow(0 0 8px rgba(79,195,217,.18))}
.anoncode{font-family:var(--font-mono);font-size:13px;color:var(--text-mid);margin-top:2px;letter-spacing:.05em}
.mid-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:6px}
.heat{display:block}
.keystats{margin-top:auto;display:grid;grid-template-columns:1fr 1fr;gap:6px 8px;
  border-top:1px solid var(--surface-line);padding-top:8px}
.ks-l{font-size:10px;color:var(--text-lo);text-transform:uppercase;letter-spacing:.04em}
.ks-v{font-family:var(--font-mono);font-weight:600;font-size:15px;color:var(--text-hi);line-height:1}
.ks-v span{font-size:10px;color:var(--text-mid);font-weight:500}
/* detail panel */
.detail{width:360px;flex-shrink:0}
.panel{background:var(--surface-2);border:1px solid var(--surface-line);border-radius:var(--r-xl);
  padding:22px;box-shadow:var(--sh-2)}
.panel .pos-tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--pos-fwd);background:rgba(229,83,60,.12);padding:4px 10px;border-radius:999px;margin-bottom:10px}
.panel h2{font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--text-hi);
  font-family:var(--font-mono);letter-spacing:.04em}
.panel .sub{font-size:13px;color:var(--text-lo);margin-bottom:16px}
.big-spider{display:flex;justify-content:center;margin:6px 0 14px}
.axis-legend{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-bottom:16px}
.axis-legend div{display:flex;justify-content:space-between;font-size:12px;
  border-bottom:1px solid var(--surface-line);padding-bottom:5px}
.axis-legend span:first-child{color:var(--text-mid)}
.axis-legend span:last-child{font-family:var(--font-mono);color:var(--data);font-weight:600}
.btn{width:100%;height:48px;border-radius:var(--r-md);border:none;cursor:pointer;
  font-family:var(--font-body);font-weight:600;font-size:15px;transition:.2s}
.btn-primary{background:var(--accent);color:var(--text-onAccent);box-shadow:var(--glow-soft)}
.btn-primary:hover{background:var(--accent-hi)}
.btn-ghost{background:transparent;color:var(--text-mid);border:1px solid var(--surface-line)}
.compare-tray{margin-top:16px;padding:14px;background:var(--surface-1);border-radius:var(--r-md);
  border:1px dashed var(--surface-line)}
.compare-tray .overline{margin-bottom:8px;display:block}
.slotmini{display:flex;gap:8px}
.slotmini .s{flex:1;height:60px;border-radius:8px;border:1px dashed var(--surface-line);
  display:flex;align-items:center;justify-content:center;color:var(--text-lo);font-size:12px}
/* bottom bar */
.bottombar{position:fixed;bottom:0;left:0;right:0;height:72px;background:rgba(20,27,36,.9);
  backdrop-filter:blur(12px);border-top:1px solid var(--surface-line);
  display:flex;align-items:center;gap:16px;padding:0 32px;z-index:20}
.mini-form{display:flex;gap:5px}
.mini-form i{width:10px;height:10px;border-radius:50%;background:var(--surface-line)}
.mini-form i.f{background:var(--accent)}
.bottombar .go{margin-left:auto;height:44px;padding:0 24px;border-radius:var(--r-md);background:var(--accent);
  color:var(--text-onAccent);font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;
  box-shadow:var(--glow-soft)}
.footer-src{position:fixed;bottom:80px;right:16px;font-size:11px;color:var(--text-lo);opacity:.7}
.note{max-width:1200px;margin:0 auto;padding:8px 24px 0;font-size:12px;color:var(--text-lo)}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">BLIND <b>XI</b></div>
  <span class="crumb">스카우팅 · 카드 탐색</span>
  <div class="filters">
    <button class="chip" data-p="GK">GK</button>
    <button class="chip on" data-p="DEF">DEF</button>
    <button class="chip on" data-p="MID">MID</button>
    <button class="chip on" data-p="FWD">FWD</button>
  </div>
  <div class="progress">배치 <b>3</b>/11</div>
</div>

<div class="note">목업: S1 카드 탐색 화면 — 실제 디자인 토큰 적용. 카드 앞면(익명)·스파이더·미니 히트맵·실루엣 실물 렌더.</div>

<div class="wrap">
  <div class="grid-col">
    <div class="section-h">후보 선수 풀</div>
    <div class="section-sub">이름도, 국적도 없습니다. 데이터만 보고 판단하세요.</div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="detail">
    <div class="panel">
      <span class="pos-tag">FWD · 최전방</span>
      <h2>#F03</h2>
      <div class="sub">출전 신뢰도 ●●●● · 표본 충분</div>
      <div class="big-spider" id="bigspider"></div>
      <div class="axis-legend">
        <div><span>공격</span><span>94</span></div>
        <div><span>패스</span><span>71</span></div>
        <div><span>수비</span><span>28</span></div>
        <div><span>드리블</span><span>88</span></div>
        <div><span>공중</span><span>52</span></div>
        <div><span>활동량</span><span>76</span></div>
      </div>
      <button class="btn btn-primary" style="margin-bottom:10px">이 선수 배치하기</button>
      <button class="btn btn-ghost">비교에 추가</button>
      <div class="compare-tray">
        <span class="overline">비교 트레이 (최대 2)</span>
        <div class="slotmini"><div class="s">비어 있음</div><div class="s">비어 있음</div></div>
      </div>
    </div>
  </div>
</div>

<div class="bottombar">
  <div class="mini-form">
    <i class="f"></i><i class="f"></i><i class="f"></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
  </div>
  <span style="font-size:13px;color:var(--text-mid)">라인업 3 / 11</span>
  <button class="go">배치하러 가기 ▶</button>
</div>
<div class="footer-src">데이터: StatsBomb Open Data</div>

<script>
// ---- SVG generators (전부 코드 생성, 외부 이미지 0) ----
function silhouette(color){
  // 상반신 실루엣 (무채색 + 청록 rim)
  return `<svg width="54" height="54" viewBox="0 0 54 54">
    <circle cx="27" cy="17" r="9.5" fill="#2A3641" stroke="${color}" stroke-width="1" opacity=".95"/>
    <path d="M9 50c0-11 8-18 18-18s18 7 18 18z" fill="#2A3641" stroke="${color}" stroke-width="1"/>
  </svg>`;
}
function spider(vals,size,color){
  // vals: 6축 0~100
  const cx=size/2,cy=size/2,R=size/2-14,N=6;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/N;return[cx+Math.cos(a)*r,cy+Math.sin(a)*r];};
  let rings='';
  [.4,.7,1].forEach(f=>{let p='';for(let i=0;i<N;i++){const[x,y]=pt(i,R*f);p+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);}rings+=`<path d="${p}Z" fill="none" stroke="#33424F" stroke-width="1" opacity=".5"/>`;});
  let spokes='';for(let i=0;i<N;i++){const[x,y]=pt(i,R);spokes+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#33424F" stroke-width="1" opacity=".4"/>`;}
  let poly='';const dots=[];for(let i=0;i<N;i++){const[x,y]=pt(i,R*vals[i]/100);poly+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);dots.push([x,y]);}
  let dm='';dots.forEach(([x,y])=>dm+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.4" fill="${color}"/>`);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${rings}${spokes}<path d="${poly}Z" fill="${color}" fill-opacity=".18" stroke="${color}" stroke-width="1.6"/>${dm}</svg>`;
}
function heatmap(cells,color){
  const cols=16,rows=10,cw=4,ch=4;let r='';
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){const v=cells[y*cols+x]||0;if(v<6)continue;
    r+=`<rect x="${x*cw}" y="${y*ch}" width="${cw}" height="${ch}" rx="1" fill="${color}" opacity="${(v/100*.9+.1).toFixed(2)}"/>`;}
  return `<svg class="heat" width="${cols*cw}" height="${rows*ch}" viewBox="0 0 ${cols*cw} ${rows*ch}">
    <rect width="${cols*cw}" height="${rows*ch}" rx="3" fill="#0D141C"/>${r}</svg>`;
}
function fakeHeat(bias){const c=[];for(let y=0;y<10;y++)for(let x=0;x<16;x++){
  const d=Math.max(0,100-(Math.abs(x-bias.x)*14+Math.abs(y-bias.y)*16))*(.6+Math.random()*.4);c.push(Math.min(100,Math.round(d)));}return c;}

const CARDS=[
  {pos:'fwd',lab:'최전방',code:'#F03',conf:4,sp:[94,71,28,88,52,76],ks:[['90\'슛','3.1'],['xG','0.7'],['드리블','4.2'],['득점','6']],heat:fakeHeat({x:12,y:3})},
  {pos:'mid',lab:'중앙 미드필더',code:'#M11',conf:4,sp:[58,92,74,66,48,88],ks:[['패스%','91'],['키패스','2.4'],['전진패스','48'],['xA','0.3']],heat:fakeHeat({x:8,y:5})},
  {pos:'def',lab:'중앙 수비',code:'#D07',conf:3,sp:[22,64,93,31,84,58],ks:[['태클','3.4'],['인터셉트','2.1'],['공중%','78'],['리커버리','7']],heat:fakeHeat({x:4,y:6})},
  {pos:'fwd',lab:'윙어',code:'#F19',conf:3,sp:[81,68,34,95,38,90],ks:[['드리블','6.1'],['90\'슛','2.2'],['키패스','1.9'],['스프린트','24']],heat:fakeHeat({x:13,y:2})},
  {pos:'mid',lab:'수비형 MF',code:'#M04',conf:4,sp:[34,79,88,52,66,82],ks:[['패스%','89'],['태클','3.0'],['인터셉트','2.6'],['리커버리','9']],heat:fakeHeat({x:7,y:6})},
  {pos:'def',lab:'풀백',code:'#D21',conf:3,sp:[41,74,71,68,44,86],ks:[['크로스','4.1'],['태클','2.4'],['전진패스','32'],['스프린트','28']],heat:fakeHeat({x:3,y:4})},
  {pos:'gk',lab:'골키퍼',code:'#G01',conf:4,sp:[8,58,42,12,74,36],ks:[['선방%','76'],['클린시트','3'],['펀칭','1.8'],['패스%','82']],heat:fakeHeat({x:1,y:5})},
  {pos:'fwd',lab:'세컨드 스트라이커',code:'#F27',conf:3,sp:[76,83,40,79,46,81],ks:[['xG','0.5'],['키패스','2.7'],['드리블','3.8'],['득점','4']],heat:fakeHeat({x:11,y:4})},
  {pos:'mid',lab:'공격형 MF',code:'#M16',conf:4,sp:[68,95,52,74,42,84],ks:[['키패스','3.2'],['xA','0.4'],['패스%','88'],['드리블','3.1']],heat:fakeHeat({x:10,y:4})},
];
const posColor={fwd:'var(--pos-fwd)',mid:'var(--pos-mid)',def:'var(--pos-def)',gk:'var(--pos-gk)'};
const rawColor={fwd:'#E5533C',mid:'#3FB98C',def:'#5B8DEF',gk:'#E8B04B'};
const grid=document.getElementById('grid');
CARDS.forEach(c=>{
  const dots=Array.from({length:4},(_,i)=>`<i class="${i<c.conf?'f':''}"></i>`).join('');
  const ks=c.ks.map(([l,v])=>`<div><div class="ks-l">${l}</div><div class="ks-v">${v}</div></div>`).join('');
  const el=document.createElement('div');
  el.className='card '+c.pos;
  el.innerHTML=`
    <div class="card-top">
      <span class="ribbon">${c.pos.toUpperCase()} · ${c.lab}</span>
      <span class="conf">${dots}</span>
    </div>
    <div class="avatar-wrap">${silhouette(rawColor[c.pos])}<span class="anoncode">${c.code}</span></div>
    <div class="mid-row">${spider(c.sp,108,'#4FC3D9')}</div>
    <div class="mid-row">${heatmap(c.heat,'#4FC3D9')}</div>
    <div class="keystats">${ks}</div>`;
  grid.appendChild(el);
});
document.getElementById('bigspider').innerHTML=spider([94,71,28,88,52,76],200,'#4FC3D9');
document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>ch.classList.toggle('on'));
</script>
</body>
</html>
